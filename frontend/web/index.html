<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="procurement_ai">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Procurement AI</title>
  <link rel="manifest" href="manifest.json">
  <!-- Three.js + FloatingLines GLSL Shader Background -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="floating_lines.js"></script>
  <style>
    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999;
      pointer-events: none;
      display: none;
      mix-blend-mode: screen;
    }
  </style>
  <script>
    let floatingLinesEffect = null;
    function initFloatingLines() {
      var el = document.getElementById('vanta-bg');
      if (!el) return;
      el.style.display = 'block';
      if (floatingLinesEffect) { floatingLinesEffect.destroy(); }

      setTimeout(() => {
        floatingLinesEffect = window.createFloatingLines('vanta-bg', {
          enabledWaves: ['top', 'middle', 'bottom'],
          lineCount: 5,
          lineDistance: 5,
          bendRadius: 5,
          bendStrength: -0.5,
          interactive: true,
          parallax: true,
          animationSpeed: 1
        });
      }, 150);
    }
    function destroyFloatingLines() {
      var el = document.getElementById('vanta-bg');
      if (el) el.style.display = 'none';
      if (floatingLinesEffect) { floatingLinesEffect.destroy(); floatingLinesEffect = null; }
    }
  </script>
</head>

<body>
  <div id="vanta-bg"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
